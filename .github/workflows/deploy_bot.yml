name: deploy_bot

# Deploys the Telegram chat bot to Fly.io.
#
# This workflow handles the entire setup end-to-end. Darci does NOT need
# to use Fly's web UI to create the app or set secrets — all of that
# happens here from one click.
#
# Prereqs (one-time, all in GitHub web UI):
#   1. Fly.io account created at https://fly.io (with billing/card on file
#      — even free tier requires a payment method to verify identity)
#   2. Fly personal access token created at
#      https://fly.io/user/personal_access_tokens
#      and saved as GitHub repo secret FLY_API_TOKEN
#   3. Bot creds saved as GitHub repo secrets:
#        TELEGRAM_BOT_TOKEN          (from @BotFather)
#        TELEGRAM_ALLOWED_USER_ID    (from @userinfobot)
#   4. The shared secrets used by the weekly run (already in place if
#      the weekly cron is working):
#        ANTHROPIC_API_KEY
#        GOOGLE_SHEET_ID
#        GOOGLE_SERVICE_ACCOUNT_JSON
#
# After prereqs, click "Run workflow" once. The workflow creates the Fly
# app (if needed), stages all secrets, then deploys. Future code pushes
# to chat/ auto-redeploy.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'chat/**'
      - 'Dockerfile'
      - 'fly.toml'
      - '.github/workflows/deploy_bot.yml'
      - 'requirements.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-bot
      cancel-in-progress: true
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify required secrets are configured
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USER_ID: ${{ secrets.TELEGRAM_ALLOWED_USER_ID }}
        run: |
          missing=()
          [ -z "$FLY_API_TOKEN" ] && missing+=("FLY_API_TOKEN")
          [ -z "$ANTHROPIC_API_KEY" ] && missing+=("ANTHROPIC_API_KEY")
          [ -z "$GOOGLE_SHEET_ID" ] && missing+=("GOOGLE_SHEET_ID")
          [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ] && missing+=("GOOGLE_SERVICE_ACCOUNT_JSON")
          [ -z "$TELEGRAM_BOT_TOKEN" ] && missing+=("TELEGRAM_BOT_TOKEN")
          [ -z "$TELEGRAM_ALLOWED_USER_ID" ] && missing+=("TELEGRAM_ALLOWED_USER_ID")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing GitHub repo secrets: ${missing[*]}"
            echo "::error::Add them at https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "All required secrets present."

      - name: Resolve app name from fly.toml
        id: app
        run: |
          APP_NAME=$(grep -E '^app\s*=' fly.toml | head -n1 | cut -d'"' -f2)
          if [ -z "$APP_NAME" ]; then
            echo "::error::Could not parse 'app' from fly.toml"
            exit 1
          fi
          echo "name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "App name: $APP_NAME"

      - name: Create Fly app if it doesn't exist
        run: |
          APP="${{ steps.app.outputs.name }}"
          if flyctl status --app "$APP" >/dev/null 2>&1; then
            echo "App '$APP' already exists. Skipping create."
          else
            echo "Creating app '$APP' in 'personal' org..."
            flyctl apps create "$APP" --org personal
          fi

      - name: Stage secrets on the Fly app
        # --stage uploads secrets but doesn't redeploy — the following
        # deploy step picks them up in the same revision.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USER_ID: ${{ secrets.TELEGRAM_ALLOWED_USER_ID }}
        run: |
          APP="${{ steps.app.outputs.name }}"
          flyctl secrets set --app "$APP" --stage \
            ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
            GOOGLE_SHEET_ID="$GOOGLE_SHEET_ID" \
            GOOGLE_SERVICE_ACCOUNT_JSON="$GOOGLE_SERVICE_ACCOUNT_JSON" \
            TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN" \
            TELEGRAM_ALLOWED_USER_ID="$TELEGRAM_ALLOWED_USER_ID"

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --app "${{ steps.app.outputs.name }}"
