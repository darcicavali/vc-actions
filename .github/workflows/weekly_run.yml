name: weekly_run

on:
  # Monday 8 AM Central Time. GitHub Actions cron is UTC.
  # 13:00 UTC = 8 AM CDT (DST) / 7 AM CST. Run at 14:00 UTC to be 8 AM CST always.
  # Compromise: 13:00 UTC = 8 AM CDT, 7 AM CST. Acceptable; adjust in fall if needed.
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no sheet writes, no email)"
        required: false
        default: "false"
      bootstrap_only:
        description: "Bootstrap only — create tabs and exit. No Claude calls, costs $0."
        required: false
        default: "false"
      list_tabs:
        description: "List every tab in the sheet and exit. Read-only, costs $0."
        required: false
        default: "false"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run weekly
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-5-20250929' }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          SHOPIFY_STORE_DOMAIN: ${{ vars.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          OMNISEND_API_KEY: ${{ secrets.OMNISEND_API_KEY }}
          OMNISEND_DIGEST_EVENT: ${{ vars.OMNISEND_DIGEST_EVENT || 'vc_weekly_plan' }}
          OMNISEND_DIGEST_RECIPIENT: ${{ vars.OMNISEND_DIGEST_RECIPIENT }}
          VC_ACTIONS_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          # Seconds to sleep between specialist agents. 60s keeps us under
          # the Anthropic default-tier 30k input tokens/minute rate limit.
          # Set to 0 if you're on a higher API tier.
          VC_ACTIONS_INTER_AGENT_DELAY_SECONDS: ${{ vars.VC_ACTIONS_INTER_AGENT_DELAY_SECONDS || '60' }}
        run: |
          ARGS=""
          if [ "${{ inputs.bootstrap_only }}" = "true" ]; then
            ARGS="$ARGS --bootstrap-only"
          fi
          if [ "${{ inputs.list_tabs }}" = "true" ]; then
            ARGS="$ARGS --list-tabs"
          fi
          python -m scripts.runner $ARGS

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest -q
